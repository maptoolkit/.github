name: Release

on:
  workflow_call:
    inputs:
      type:
        description: 'Release type'
        type: string
        required: true
    outputs:
      tag:
        description: 'The created release tag (e.g. v1.2.3)'
        value: ${{ jobs.release.outputs.tag }}

jobs:
  release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.changelog.outputs.tag }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.repository.full_name }}
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate input
        run: |
          if [[ ! "${{ inputs.type }}" =~ ^(patch|minor|major)$ ]]; then
            echo "Invalid release type: '${{ inputs.type }}' — must be patch, minor or major"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.type }} --no-git-tag-version

      - name: Generate changelog entry
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION#v}"
          DATE=$(date +%Y-%m-%d)
          REPO="${{ github.event.repository.name }}"
          PREV_TAG=$(git tag --list 'v*' | sort -V | tail -1)

          ENTRIES=""
          GIT_LOG_OUTPUT=$(git log "${PREV_TAG:+$PREV_TAG..}HEAD" --pretty=format:"%s|%h" --first-parent)

          while IFS='|' read -r msg sha; do
            [ -z "$msg" ] && continue
            msg="${msg^}"
            # Normalize GitHub merge commits: replace "Merge pull request #XX from ..." with PR title
            if [[ $msg =~ ^Merge[[:space:]]pull[[:space:]]request[[:space:]]#([0-9]+)[[:space:]]from ]]; then
              pr_num="${BASH_REMATCH[1]}"
              pr_title=$(gh api repos/maptoolkit/$REPO/pulls/$pr_num -q '.title' 2>/dev/null || echo "")
              [ -n "$pr_title" ] && msg="${pr_title^} #${pr_num}"
            fi
            if [[ $msg =~ \#([0-9]+) ]]; then
              pr_num="${BASH_REMATCH[1]}"
              author=$(gh api repos/maptoolkit/$REPO/pulls/$pr_num -q '.user.login' 2>/dev/null || echo "")
              msg_clean=$(echo "$msg" | sed -E "s/ ?#[0-9]+//")
              if [ -n "$author" ]; then
                ENTRIES="$ENTRIES\n- $msg_clean by [@$author](https://github.com/$author) in [#$pr_num](https://github.com/maptoolkit/$REPO/pull/$pr_num)"
              else
                ENTRIES="$ENTRIES\n- $msg_clean in [#$pr_num](https://github.com/maptoolkit/$REPO/pull/$pr_num)"
              fi
            else
              ENTRIES="$ENTRIES\n- $msg [$sha](https://github.com/maptoolkit/$REPO/commit/$sha)"
            fi
          done <<< "$GIT_LOG_OUTPUT"

          [ -z "$ENTRIES" ] && ENTRIES="\n- (no changes)"

          ENTRY="## ${TAG} - ${DATE}\n${ENTRIES}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          {
            echo "entry<<EOF"
            printf "%b" "$ENTRY"
            echo ""
            echo "EOF"
            echo "notes<<EOF"
            printf "%b" "$ENTRIES"
            echo ""
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            TEMP=$(mktemp)
            head -1 CHANGELOG.md > "$TEMP"
            printf "\n%b\n" "${{ steps.changelog.outputs.entry }}" >> "$TEMP"
            tail -n +2 CHANGELOG.md >> "$TEMP"
            mv "$TEMP" CHANGELOG.md
          else
            printf "# Changelog\n\n%b\n" "${{ steps.changelog.outputs.entry }}" > CHANGELOG.md
          fi

      - name: Commit, tag and push
        run: |
          git add package.json CHANGELOG.md
          git commit -m "${{ steps.changelog.outputs.tag }}"
          git tag "${{ steps.changelog.outputs.tag }}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.changelog.outputs.tag }}" \
            --title "${{ steps.changelog.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.notes }}"
